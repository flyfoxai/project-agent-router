routing_policy:
  default_dispatch_mode: manual
  gateway_auto_dispatch_allowed: false
  coder_concurrency_expansion_allowed: false
  require_project_header_in_reports: true
  require_live_git_root_verification_before_completion: true
  conflict_resolution_order:
    - explicit_project_id_from_user_or_task
    - task_guard_project_evidence
    - cwd_matches_project_root_or_business_root
    - git_top_level_matches_current_git_root
    - hermes_profile_terminal_cwd
    - block_and_request_ASK总管_disambiguation

reporter_header_template:
  required_fields:
    - project_id
    - display_name
    - business_root
    - project_root
    - current_git_root
    - desired_git_root
    - git_root_status
    - task_guard_workspace
    - target_repository
    - verification_status
  example: |
    项目：{display_name}
    project_id：{project_id}
    业务根：{business_root}
    项目根：{project_root}
    当前 Git 根：{current_git_root}
    目标 Git 根：{desired_git_root}
    Git 状态：{git_root_status}
    task_guard workspace：{task_guard_workspace}
    目标仓库：{target_repository}
    验证状态：{verification_status}

task_guard_policy:
  short_term_evidence_must_include:
    - project_id
    - workspace_path
    - git_root
    - business_root
    - target_repository
    - evidence_paths
    - forbidden_scope_checked
  cross_project_rule: "Source project keeps an index pointer only; target project owns real execution evidence."
  completion_requires:
    - target_files_read_back
    - live_git_status_recorded
    - forbidden_scope_checked
    - no_commit_push_publish_merge

